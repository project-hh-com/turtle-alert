name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

      - name: Build DMGs (x64 + arm64)
        run: npx electron-builder --mac --x64 --arm64 --publish never

      - name: Rename DMGs to version-less names
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release
          cp "dist/TurtleAlert-${VERSION}-arm64.dmg" "release/TurtleAlert-arm64.dmg"
          cp "dist/TurtleAlert-${VERSION}.dmg"       "release/TurtleAlert-x64.dmg"
          ls -lh release/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists — uploading assets only"
            gh release upload "$GITHUB_REF_NAME" \
              release/TurtleAlert-arm64.dmg \
              release/TurtleAlert-x64.dmg \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              release/TurtleAlert-arm64.dmg \
              release/TurtleAlert-x64.dmg \
              --title "거북이경보 ${GITHUB_REF_NAME}" \
              --generate-notes
          fi
